<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStock | Real-Time Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-blue-700 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-warehouse text-2xl"></i>
                <span class="text-xl font-bold tracking-wider">CLOUDSTOCK</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-sm opacity-80">Palangkaraya Hub</span>
                <div class="h-3 w-3 bg-green-400 rounded-full animate-pulse"></div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Warehouse Overview</h1>
            <p class="text-gray-500">Monitoring kondisi inventaris secara real-time melalui Azure Cloud.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4">
                <div class="p-3 bg-blue-100 text-blue-600 rounded-lg">
                    <i class="fas fa-boxes-stacked fa-2x"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Level Stok</p>
                    <h2 id="stock-value" class="text-3xl font-bold text-gray-900">--</h2>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4">
                <div class="p-3 bg-orange-100 text-orange-600 rounded-lg">
                    <i class="fas fa-thermometer-half fa-2x"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Temperatur</p>
                    <h2 id="temp-value" class="text-3xl font-bold text-gray-900">--°C</h2>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4">
                <div class="p-3 bg-teal-100 text-teal-600 rounded-lg">
                    <i class="fas fa-droplet fa-2x"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Kelembapan</p>
                    <h2 id="hum-value" class="text-3xl font-bold text-gray-900">--%</h2>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-5 border-b border-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-lg text-gray-800">Log Aktivitas Sensor</h3>
                <button onclick="fetchData()" class="text-blue-600 hover:text-blue-800 text-sm font-semibold">
                    <i class="fas fa-sync-alt mr-1"></i> Refresh
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-400 text-xs uppercase font-bold">
                        <tr>
                            <th class="px-6 py-4">Waktu</th>
                            <th class="px-6 py-4">Device ID</th>
                            <th class="px-6 py-4">Stok</th>
                            <th class="px-6 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="data-table" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-6 border-t border-gray-200 text-center text-gray-400 text-sm">
        <p>&copy; 2026 CloudStock Monitoring System | Universitas Palangka Raya</p>
    </footer>

    <script>
        // Masukkan URL API Azure Function Anda di sini nantinya
        const API_URL = "URL_AZURE_FUNCTION_ANDA";

        async function fetchData() {
            try {
                // Catatan: Anda perlu mengatur CORS di Azure Function agar bisa diakses dari domain web ini
                // console.log("Fetching data from Azure...");
                
                // Logika pengambilan data akan diimplementasikan di sini
                // Untuk sementara, kita biarkan statis untuk keperluan demo tampilan
                document.getElementById('stock-value').innerText = "156";
                document.getElementById('temp-value').innerText = "27";
                document.getElementById('hum-value').innerText = "65";

                const table = document.getElementById('data-table');
                table.innerHTML = `
                    <tr>
                        <td class="px-6 py-4 text-sm">22:43:11</td>
                        <td class="px-6 py-4 text-sm font-mono text-blue-600">IoTDevice-PKY</td>
                        <td class="px-6 py-4 text-sm">156 Units</td>
                        <td class="px-6 py-4"><span class="bg-green-100 text-green-700 py-1 px-3 rounded-full text-xs font-bold">NORMAL</span></td>
                    </tr>
                `;
            } catch (error) {
                console.error("Gagal mengambil data:", error);
            }
        }

        // Jalankan fetch saat halaman dimuat
        window.onload = fetchData;
        // Auto refresh setiap 10 detik
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
